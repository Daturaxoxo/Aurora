[workspace]
members = ["crates/main", "crates/backend", "crates/shared"]
resolver = "2"

[workspace.dependencies]
log = "0.4"
anyhow = "1.0"
scandir = "2.0"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }

[profile.release]
lto = true
codegen-units = 1
strip = "symbols"
opt-level = "z"