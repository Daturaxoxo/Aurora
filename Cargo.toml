[package]
name = "AuroraSteamWrapper"
version = "0.1.0"
edition = "2024"

[dependencies]
slint = { version = "1.17.0", default-features = false, features = ["std", "backend-winit", "renderer-winit-software", "compat-1-2"] }
open = "5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "6.0.0"

[build-dependencies]
slint-build = "1.3.2"
winresource = "0.1.31"
image = "0.25.10"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.62.2", features = [
    "Win32_UI_Shell",
    "Win32_UI_WindowsAndMessaging",
] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"